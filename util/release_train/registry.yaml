    depends_on: []
    ship_paths: ["juniper_data/"]
    exclude_paths: ["juniper_data/tests/"]

  - pypi_name: juniper-data-client
    repo: juniper-data-client
    path: "."
    version_source: static
    tag_pattern: "v*"
    archive_name: "RELEASE_NOTES_juniper-data-client_v{version}.md"
    trigger: {now: release, target: release}
    verify: {now: fallback, target: strict}
    depends_on: []
    ship_paths: ["juniper_data_client/"]
    exclude_paths: ["juniper_data_client/tests/"]

  # ---- juniper-recurrence: 3 sub-packages ------------------------------------
  - pypi_name: juniper-recurrence
    repo: juniper-recurrence
    path: "juniper-recurrence/"
    version_source: dynamic       # dynamic=["version"] -> juniper_recurrence/_version.py __version__
    tag_pattern: "juniper-recurrence-v*"
    archive_name: "RELEASE_NOTES_juniper-recurrence_v{version}.md"
    trigger: {now: tag, target: release}     # F-4: still push:tags today
    verify: {now: strict, target: strict}
    depends_on: ["juniper-service-core", "juniper-model-core", "juniper-recurrence-model", "juniper-data-client"]
    ship_paths: ["juniper-recurrence/juniper_recurrence/"]
    exclude_paths: []

  - pypi_name: juniper-recurrence-client
    repo: juniper-recurrence
    path: "juniper-recurrence-client/"
    version_source: dynamic       # dynamic=["version"] -> juniper_recurrence_client/_version.py __version__
    tag_pattern: "juniper-recurrence-client-v*"
    archive_name: "RELEASE_NOTES_juniper-recurrence-client_v{version}.md"
    trigger: {now: tag, target: release}     # F-4: still push:tags today
    verify: {now: strict, target: strict}
