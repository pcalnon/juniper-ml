# Juniper PyPI release-train package registry (plan S4.1)
# ---------------------------------------------------------------------------
# Single source of truth for the 18 publishable Juniper packages across 8 repos.
# Consumed data-driven by util/release_train/detect.py so the detector hardcodes
# no package facts (plan S4.1: "so the detector is data-driven, not hardcoded").
#
# Provenance of every value (NOT invented -- each traced to a source and
# re-verified against the sibling repos on disk 2026-07-11):
#   pypi_name / repo / path / trigger / verify   -> audit S1 table + plan Appendix B
#   version_source (static|dynamic)              -> audit S2 (dynamic = model-core
#                                                   + the 3 recurrence packages)
#   tag_pattern                                  -> audit S7.3 / git ls-remote --tags
#   archive_name                                 -> publish-procedure S11.3 (_v separator;
#                                                   RELEASE_NOTES_v<ver> meta / _<pkg>_v<ver> else)
#   depends_on                                   -> each package's real pyproject
#                                                   [project.dependencies] juniper-* runtime deps
#                                                   (cross-checked against plan S13 DAG + meta extras)
#   ship_paths / exclude_paths                   -> each package's pyproject
#                                                   [tool.setuptools.packages.find] (verified on disk)
#
# Field reference (plan S4.1):
#   pypi_name       PyPI distribution name.
#   repo            owning GitHub repo (one of the 8 publishing repos).
#   path            package root relative to the repo (locates <path>pyproject.toml
#                   -- the version source; "." = repo root; cascor app = "." minus subpkgs).
#   version_source  static  -> read [project].version from <path>pyproject.toml
#                   dynamic -> read __version__ from the import package's _version.py
#   tag_pattern     last-release-tag glob ("v*" | "juniper-<pkg>-v*"); the diff base
#                   is the tag whose stripped version == the current PyPI version.
#   archive_name    central juniper-ml/notes/releases/ filename template ({version} slot).
#   trigger.now     current publish trigger (release = release:published; tag = push:tags).
#   trigger.target  Phase-0 normalization target (all -> release; F-4).
#   verify.now      current TestPyPI install-verify mode (strict = --no-deps; fallback = +pypi.org).
#   verify.target   Phase-0 normalization target (strict except the documented meta exception; F-5).
#   depends_on      upstream juniper-* runtime deps (for D6 dependency-ordering, plan S13).
#                   Soft extras-level edges are Phase-4 refinement; core runtime deps are the
#                   hard ordering edges. The meta is the sole package whose deps ARE its extras.
#   ship_paths      repo-relative dir prefixes whose SUBSTANTIVE source changes are
#                   release-worthy (plan S4.2 step 5 SHIP set). Empty for the meta
#                   (it ships no importable module -- only pyproject runtime/extras changes ship).
#   exclude_paths   repo-relative prefixes subtracted from ship_paths (tests, backups,
#                   and -- for the cascor app -- the two co-located sub-package dirs).
#
# The <path>pyproject.toml is ALWAYS a ship candidate for runtime-dep/version/non-test-extra
# changes (evaluated by the detector's pyproject-hunk classifier), independent of ship_paths.
#
# This registry supersedes the recurrence-omission gap in ecosystem.yaml /
# docs-full-check.yml by listing all 8 publishing repos, including juniper-recurrence.

packages:
  # ---- juniper-ml: meta + 6 sub-packages -------------------------------------
  - pypi_name: juniper-ml
    repo: juniper-ml
    path: "."
    version_source: static
    tag_pattern: "v*"
    archive_name: "RELEASE_NOTES_v{version}.md"
    trigger: {now: release, target: release}
    verify: {now: fallback, target: fallback}   # meta keeps the documented extras-resolution exception (audit S3.4)
    depends_on:
      - juniper-data-client
      - juniper-cascor-client
      - juniper-cascor-worker
      - juniper-canopy
      - juniper-cascor
      - juniper-data
      - juniper-ci-tools
      - juniper-config-tools
      - juniper-doc-tools
      - juniper-model-core
      - juniper-observability
      - juniper-service-core
      - juniper-recurrence-model
      - juniper-recurrence
      - juniper-recurrence-client
    ship_paths: []                # meta wheel carries no modules; only pyproject changes ship
    exclude_paths: []

  - pypi_name: juniper-ci-tools
    repo: juniper-ml
    path: "juniper-ci-tools/"
    version_source: static
    tag_pattern: "juniper-ci-tools-v*"
    archive_name: "RELEASE_NOTES_juniper-ci-tools_v{version}.md"
    trigger: {now: release, target: release}
    verify: {now: fallback, target: strict}
    depends_on: []
    ship_paths: ["juniper-ci-tools/juniper_ci_tools/"]
    exclude_paths: []

  - pypi_name: juniper-config-tools
    repo: juniper-ml
    path: "juniper-config-tools/"
    version_source: static
    tag_pattern: "juniper-config-tools-v*"
    archive_name: "RELEASE_NOTES_juniper-config-tools_v{version}.md"
    trigger: {now: release, target: release}
    verify: {now: strict, target: strict}
    depends_on: []
    ship_paths: ["juniper-config-tools/juniper_config_tools/"]
    exclude_paths: []

  - pypi_name: juniper-doc-tools
    repo: juniper-ml
    path: "juniper-doc-tools/"
    version_source: static
    tag_pattern: "juniper-doc-tools-v*"
    archive_name: "RELEASE_NOTES_juniper-doc-tools_v{version}.md"
    trigger: {now: release, target: release}
    verify: {now: strict, target: strict}
    depends_on: []
    ship_paths: ["juniper-doc-tools/juniper_doc_tools/"]
    exclude_paths: []

  - pypi_name: juniper-model-core
    repo: juniper-ml
    path: "juniper-model-core/"
    version_source: dynamic       # dynamic=["version"] -> juniper_model_core/_version.py __version__
    tag_pattern: "juniper-model-core-v*"
    archive_name: "RELEASE_NOTES_juniper-model-core_v{version}.md"
    trigger: {now: release, target: release}
    verify: {now: strict, target: strict}
    depends_on: []
    ship_paths: ["juniper-model-core/juniper_model_core/"]
    exclude_paths: []

  - pypi_name: juniper-observability
    repo: juniper-ml
    path: "juniper-observability/"
    version_source: static
    tag_pattern: "juniper-observability-v*"
    archive_name: "RELEASE_NOTES_juniper-observability_v{version}.md"
    trigger: {now: release, target: release}
    verify: {now: fallback, target: strict}
    depends_on: []
    ship_paths: ["juniper-observability/juniper_observability/"]
    exclude_paths: []

  - pypi_name: juniper-service-core
    repo: juniper-ml
    path: "juniper-service-core/"
    version_source: static
    tag_pattern: "juniper-service-core-v*"
    archive_name: "RELEASE_NOTES_juniper-service-core_v{version}.md"
    trigger: {now: release, target: release}
    verify: {now: strict, target: strict}
    depends_on: ["juniper-model-core"]
    ship_paths: ["juniper-service-core/juniper_service_core/"]
    exclude_paths: []

  # ---- juniper-cascor: app + 2 sub-packages ----------------------------------
  - pypi_name: juniper-cascor
    repo: juniper-cascor
    path: "."                     # app scope = repo minus the two co-located subpkg dirs
    version_source: static
    tag_pattern: "v*"
    archive_name: "RELEASE_NOTES_juniper-cascor_v{version}.md"
    trigger: {now: release, target: release}
    verify: {now: fallback, target: strict}
    depends_on: ["juniper-observability", "juniper-cascor-protocol", "juniper-model-core"]
    ship_paths: ["src/", "juniper_cascor/"]
    exclude_paths: ["src/tests/", "src/backups/", "juniper-cascor-model/", "juniper-cascor-protocol/"]

  - pypi_name: juniper-cascor-model
    repo: juniper-cascor
    path: "juniper-cascor-model/"
    version_source: static
    tag_pattern: "juniper-cascor-model-v*"
    archive_name: "RELEASE_NOTES_juniper-cascor-model_v{version}.md"
    trigger: {now: tag, target: release}     # F-4: still push:tags today
    verify: {now: strict, target: strict}
    depends_on: []
    ship_paths:
      - "juniper-cascor-model/juniper_cascor_model/"
      - "juniper-cascor-model/candidate_unit/"
      - "juniper-cascor-model/cascor_constants/"
      - "juniper-cascor-model/utils/"
      - "juniper-cascor-model/log_config/"
    exclude_paths: []

  - pypi_name: juniper-cascor-protocol
    repo: juniper-cascor
    path: "juniper-cascor-protocol/"
    version_source: static
    tag_pattern: "juniper-cascor-protocol-v*"
    archive_name: "RELEASE_NOTES_juniper-cascor-protocol_v{version}.md"
    trigger: {now: tag, target: release}     # F-4: still push:tags today
    verify: {now: fallback, target: strict}
    depends_on: []
    ship_paths: ["juniper-cascor-protocol/juniper_cascor_protocol/"]
    exclude_paths: []

  # ---- standalone sibling repos ----------------------------------------------
  - pypi_name: juniper-canopy
    repo: juniper-canopy
    path: "."
    version_source: static
    tag_pattern: "v*"
    archive_name: "RELEASE_NOTES_juniper-canopy_v{version}.md"
    trigger: {now: release, target: release}
    verify: {now: strict, target: strict}
    depends_on: ["juniper-observability", "juniper-service-core", "juniper-cascor-protocol"]
    ship_paths: ["juniper_canopy/", "src/"]
    exclude_paths: ["src/tests/"]

  - pypi_name: juniper-cascor-client
    repo: juniper-cascor-client
    path: "."
    version_source: static
    tag_pattern: "v*"
    archive_name: "RELEASE_NOTES_juniper-cascor-client_v{version}.md"
    trigger: {now: release, target: release}
    verify: {now: fallback, target: strict}
    depends_on: ["juniper-cascor-protocol"]
    ship_paths: ["juniper_cascor_client/"]
    exclude_paths: ["juniper_cascor_client/tests/"]

  - pypi_name: juniper-cascor-worker
    repo: juniper-cascor-worker
    path: "."
    version_source: static
    tag_pattern: "v*"
    archive_name: "RELEASE_NOTES_juniper-cascor-worker_v{version}.md"
    trigger: {now: release, target: release}
    verify: {now: fallback, target: strict}
    depends_on: ["juniper-cascor-protocol", "juniper-config-tools", "juniper-cascor-model"]
    ship_paths: ["juniper_cascor_worker/"]
    exclude_paths: ["juniper_cascor_worker/tests/"]

  - pypi_name: juniper-data
    repo: juniper-data
    path: "."
    version_source: static
    tag_pattern: "v*"
