    ship_paths: ["juniper-recurrence-client/juniper_recurrence_client/"]
    exclude_paths: []

  - pypi_name: juniper-recurrence-model
    repo: juniper-recurrence
    path: "juniper-recurrence-model/"
    version_source: dynamic       # dynamic=["version"] -> juniper_recurrence_model/_version.py __version__
    tag_pattern: "juniper-recurrence-model-v*"
    archive_name: "RELEASE_NOTES_juniper-recurrence-model_v{version}.md"
