---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-model-core (subdirectory of juniper-ml)
# File Name:     ci-model-core.yml
# Author:        Paul Calnon
#
# Date Created:  2026-06-14
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    CI pipeline for the juniper-model-core package (WS-3 of the model/middleware refactor --
#    see notes/JUNIPER_2026-06-14_JUNIPER-ML_MODEL-CORE-INTERFACE-DESIGN.md). Runs on PRs and pushes
#    that touch the package or its tests. The juniper-ml meta-package's own ci.yml continues
#    to gate the meta-package; this workflow handles the model-core subpackage independently.
#
#    The build job's smoke test installs the *bare* wheel (no extras) into a clean venv to
#    prove `import juniper_model_core` works with no third-party runtime dependency -- the
#    property that lets the publish workflow's TestPyPI verify run --no-deps.
#
#####################################################################################################################################################################################################

name: CI — juniper-model-core

on:
  push:
    branches: [main]
    paths:
      - "juniper-model-core/**"
      - ".github/workflows/ci-model-core.yml"
  pull_request:
    branches: [main]
    paths:
      - "juniper-model-core/**"
      - ".github/workflows/ci-model-core.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    defaults:
      run:
        working-directory: juniper-model-core
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install -e ".[test]"

      - name: Run unit tests with coverage
        run: |
          python -m pytest \
            --cov=juniper_model_core \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            --cov-fail-under=95

      - name: Enforce per-file coverage gate (blocking)
        run: |
          pip install "juniper-ci-tools>=0.6.0,<0.7.0"
          juniper-coverage-gap-map --coverage-json coverage.json --enforce

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: juniper-model-core
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Smoke-test the wheel (dependency-free import)
        run: |
          set -euo pipefail
          # Clean venv, bare wheel (NO extras) -- proves the top-level import needs no numpy.
          python -m venv /tmp/mc-smoke
          /tmp/mc-smoke/bin/pip install --quiet --upgrade pip
          /tmp/mc-smoke/bin/pip install --quiet dist/juniper_model_core-*.whl
          /tmp/mc-smoke/bin/python -c "import juniper_model_core as m; print('import OK', m.__version__); assert m.TrainableModel is not None"
