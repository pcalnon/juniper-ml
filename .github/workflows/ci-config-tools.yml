---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-config-tools (subdirectory of juniper-ml)
# File Name:     ci-config-tools.yml
# Author:        Paul Calnon
#
# Date Created:  2026-05-22
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    CI pipeline for the juniper-config-tools package (Wave 0 of the
#    env-var alias-with-deprecation helper PyPI migration -- see
#    notes/JUNIPER_2026-05-22_JUNIPER-ML_CONFIG-TOOLS-PYPI-MIGRATION-PLAN.md). Runs
#    on PRs and pushes that touch the package or its tests. The
#    juniper-ml meta-package's own ci.yml continues to gate the meta-
#    package; this workflow handles the config-tools subpackage
#    lifecycle independently, mirroring the precedent set by
#    ci-doc-tools.yml and ci-ci-tools.yml.
#
#####################################################################################################################################################################################################

name: CI — juniper-config-tools

on:
  push:
    branches: [main]
    paths:
      - "juniper-config-tools/**"
      - ".github/workflows/ci-config-tools.yml"
  pull_request:
    branches: [main]
    paths:
      - "juniper-config-tools/**"
      - ".github/workflows/ci-config-tools.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    defaults:
      run:
        working-directory: juniper-config-tools
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install -e ".[test]"

      - name: Run unit tests with coverage
        run: |
          python -m pytest \
            --cov=juniper_config_tools \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            --cov-fail-under=85

      - name: Enforce per-file coverage gate (blocking)
        run: |
          pip install "juniper-ci-tools>=0.6.0,<0.8.0"
          juniper-coverage-gap-map --coverage-json coverage.json --enforce

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: juniper-config-tools
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Smoke-test the wheel
        run: |
          set -euo pipefail
          # Install into a clean venv to confirm the module-form entry
          # point works without leaking from the editable install in
          # the test job.
          python -m venv /tmp/cgt-smoke
          /tmp/cgt-smoke/bin/pip install --quiet --upgrade pip
          /tmp/cgt-smoke/bin/pip install --quiet dist/juniper_config_tools-*.whl
          /tmp/cgt-smoke/bin/python -m juniper_config_tools --version
