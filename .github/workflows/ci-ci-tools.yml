---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-ci-tools (subdirectory of juniper-ml)
# File Name:     ci-ci-tools.yml
# Author:        Paul Calnon
#
# Date Created:  2026-05-20
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    CI pipeline for the juniper-ci-tools package (Wave 0 of the
#    dependency-documentation generator PyPI migration -- see
#    notes/JUNIPER_2026-05-20_JUNIPER-ML_CI-TOOLS-PYPI-MIGRATION-PLAN.md). Runs on
#    PRs and pushes that touch the package or its tests. The juniper-ml
#    meta-package's own ci.yml continues to gate the meta-package; this
#    workflow handles the ci-tools subpackage lifecycle independently,
#    mirroring the precedent set by ci-doc-tools.yml.
#
#####################################################################################################################################################################################################

name: CI — juniper-ci-tools

on:
  push:
    branches: [main]
    paths:
      - "juniper-ci-tools/**"
      - ".github/workflows/ci-ci-tools.yml"
  pull_request:
    branches: [main]
    paths:
      - "juniper-ci-tools/**"
      - ".github/workflows/ci-ci-tools.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    defaults:
      run:
        working-directory: juniper-ci-tools
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install -e ".[test]"

      - name: Run unit tests with coverage
        run: |
          python -m pytest \
            --cov=juniper_ci_tools \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            --cov-fail-under=85

      - name: Enforce per-file coverage gate (blocking)
        # Per-file coverage rollout C-2 (juniper-ml
        # notes/JUNIPER_2026-06-30_JUNIPER-ECOSYSTEM_PER-FILE-COVERAGE-ROLLOUT-SCOPING.md):
        # exit 1 if any source file's statement coverage < 90 OR the
        # sub-module's pooled (statement-weighted) coverage < 95. __main__.py
        # is a pure `python -m` entry shim and is excluded per the §2
        # excluded-files policy (dogfoods the tool's own enforcing mode).
        run: |
          pip install "juniper-ci-tools>=0.6.0,<0.8.0"
          juniper-coverage-gap-map --coverage-json coverage.json --enforce --omit "*/__main__.py"

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: juniper-ci-tools
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Smoke-test the wheel
        run: |
          set -euo pipefail
          # Install into a clean venv to confirm the entry points work
          # without leaking from the editable install in the test job.
          python -m venv /tmp/ct-smoke
          /tmp/ct-smoke/bin/pip install --quiet --upgrade pip
          /tmp/ct-smoke/bin/pip install --quiet dist/juniper_ci_tools-*.whl
          /tmp/ct-smoke/bin/juniper-generate-dep-docs --version
          /tmp/ct-smoke/bin/juniper-env-drift-check --version
          # juniper-coverage-gap-map: non-blocking smoke only (--version). The
          # enforcing --enforce mode is NOT invoked as a blocking gate here --
          # that is work-unit C-1+ of the per-file coverage rollout.
          /tmp/ct-smoke/bin/juniper-coverage-gap-map --version
          /tmp/ct-smoke/bin/python -m juniper_ci_tools --version
