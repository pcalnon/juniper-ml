---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-doc-tools (subdirectory of juniper-ml)
# File Name:     ci-doc-tools.yml
# Author:        Paul Calnon
#
# Date Created:  2026-05-18
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    CI pipeline for the juniper-doc-tools package (Wave 0 of the doc-link
#    validator PyPI migration -- see
#    notes/JUNIPER_2026-05-18_JUNIPER-ML_DOC-TOOLS-PYPI-MIGRATION-PLAN.md). Runs on
#    PRs and pushes that touch the package or its tests. The juniper-ml
#    meta-package's own ci.yml continues to gate the meta-package; this
#    workflow handles the doc-tools subpackage lifecycle independently.
#
#####################################################################################################################################################################################################

name: CI — juniper-doc-tools

on:
  push:
    branches: [main]
    paths:
      - "juniper-doc-tools/**"
      - ".github/workflows/ci-doc-tools.yml"
  pull_request:
    branches: [main]
    paths:
      - "juniper-doc-tools/**"
      - ".github/workflows/ci-doc-tools.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    defaults:
      run:
        working-directory: juniper-doc-tools
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install -e ".[test]"

      - name: Run unit tests with coverage
        run: |
          python -m pytest \
            --cov=juniper_doc_tools \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            --cov-fail-under=85

      - name: Enforce per-file coverage gate (blocking)
        # Per-file coverage rollout C-3 (juniper-ml
        # notes/JUNIPER_2026-06-30_JUNIPER-ECOSYSTEM_PER-FILE-COVERAGE-ROLLOUT-SCOPING.md):
        # exit 1 if any source file's statement coverage < 90 OR the
        # sub-module's pooled (statement-weighted) coverage < 95. The thin
        # __main__.py `python -m` entry shim is covered by an in-process
        # runpy smoke test (§2 "prefer a 1-line smoke test over an
        # exclusion where cheap"), so no --omit is needed here.
        run: |
          pip install "juniper-ci-tools>=0.6.0,<0.8.0"
          juniper-coverage-gap-map --coverage-json coverage.json --enforce

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: juniper-doc-tools
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Smoke-test the wheel
        run: |
          set -euo pipefail
          # Install into a clean venv to confirm the entry points work
          # without leaking from the editable install in the test job.
          python -m venv /tmp/dt-smoke
          /tmp/dt-smoke/bin/pip install --quiet --upgrade pip
          /tmp/dt-smoke/bin/pip install --quiet dist/juniper_doc_tools-*.whl
          /tmp/dt-smoke/bin/juniper-check-doc-links --version
          /tmp/dt-smoke/bin/python -m juniper_doc_tools --version
