---
#####################################################################################################################################################################################################
# Project:       Juniper
# File Name:     lockfile-update.yml (template)
#
# Description:
#    Refresh pinned CI lockfiles weekly via PR. Drop into a target repo's
#    `.github/workflows/lockfile-update.yml`. As of Wave 2 of the dep-docs
#    PyPI migration (notes/JUNIPER_CI_TOOLS_PYPI_MIGRATION_PLAN_2026-05-20.md),
#    this installs `juniper-ci-tools` from PyPI and invokes the
#    `juniper-generate-dep-docs` console script to regenerate
#    `conf/requirements_ci.txt` and `conf/conda_environment_ci.yaml`.
#    The workflow pushes the diff (if any) onto a new branch and opens a PR.
#
#    PRs are opened by `peter-evans/create-pull-request` using the
#    workflow's GITHUB_TOKEN. No additional secret is required for the
#    common case.
#####################################################################################################################################################################################################

name: Update Lockfiles

on:
  schedule:
    - cron: '0 8 * * 1'  # weekly Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Refresh CI lockfiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install juniper-ci-tools
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install "juniper-ci-tools>=0.1.0,<0.6.0"

      - name: Regenerate dependency lockfiles
        run: juniper-generate-dep-docs

      - name: Open PR if lockfiles changed
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          branch: chore/lockfile-update
          delete-branch: true
          commit-message: 'chore(deps): refresh CI lockfiles'
          title: 'chore(deps): refresh CI lockfiles'
          body: |
            Automated weekly refresh of CI lockfiles via the
            `juniper-generate-dep-docs` console script from the
            `juniper-ci-tools` PyPI package.
          labels: |
            dependencies
            automated
