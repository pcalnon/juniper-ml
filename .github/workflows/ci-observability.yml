---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-observability (subdirectory of juniper-ml)
# File Name:     ci-observability.yml
# Author:        Paul Calnon
#
# Date Created:  2026-04-28
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    CI pipeline for the juniper-observability shared library
#    (METRICS-MON R2.1 / seed-06). Runs on PRs and pushes that touch
#    the package or its tests. The juniper-ml meta-package's own ci.yml
#    continues to gate the meta-package; this workflow handles the
#    shared-lib lifecycle independently per design §10 Q6.
#
#####################################################################################################################################################################################################

name: CI — juniper-observability

on:
  push:
    branches: [main]
    paths:
      - "juniper-observability/**"
      - ".github/workflows/ci-observability.yml"
  pull_request:
    branches: [main]
    paths:
      - "juniper-observability/**"
      - ".github/workflows/ci-observability.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    defaults:
      run:
        working-directory: juniper-observability
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test extras
        run: pip install --upgrade "pip>=26.1.1" && pip install -e ".[test]"

      - name: Run unit tests with coverage
        run: |
          python -m pytest --cov=juniper_observability --cov-report=term-missing --cov-report=json:coverage.json --cov-fail-under=90

      - name: Enforce per-file coverage gate (blocking)
        # Per-file coverage rollout C-2 (juniper-ml
        # notes/JUNIPER_2026-06-30_JUNIPER-ECOSYSTEM_PER-FILE-COVERAGE-ROLLOUT-SCOPING.md):
        # exit 1 if any source file's statement coverage < 90 OR the
        # sub-module's pooled (statement-weighted) coverage < 95.
        run: |
          pip install "juniper-ci-tools>=0.6.0,<0.7.0"
          juniper-coverage-gap-map --coverage-json coverage.json --enforce

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: juniper-observability
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel

      - name: Validate distribution metadata
        run: twine check dist/*
