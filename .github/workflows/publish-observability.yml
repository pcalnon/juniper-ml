---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-observability (subdirectory of juniper-ml)
# File Name:     publish-observability.yml
# Author:        Paul Calnon
#
# Date Created:  2026-04-28
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    GitHub Actions publish pipeline for the juniper-observability package
#    (METRICS-MON R2.1 / seed-06). Triggered by tags matching
#    ``juniper-observability-v*`` so it stays decoupled from the juniper-ml
#    meta-package's own ``v*`` release tags. Publishes to TestPyPI first
#    (with install verification), then PyPI, via OIDC trusted publishing.
#
#####################################################################################################################################################################################################

name: Publish juniper-observability to PyPI

on:
  push:
    tags:
      - "juniper-observability-v*"
  # Manual dispatch so operators can re-fire a publish against any tag.
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Build + validate the package before publishing
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: juniper-observability
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Release-convention gate: a tag-triggered publish only proceeds when a GitHub Release exists
      # for the tag (publish by cutting a Release, never a bare `git push <tag>`). workflow_dispatch
      # skips this as the manual escape hatch.
      - name: Require a GitHub Release for this tag
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          for attempt in 1 2 3 4 5; do
            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json tagName >/dev/null 2>&1; then
              echo "GitHub Release found for $tag — proceeding."
              exit 0
            fi
            echo "No GitHub Release for $tag yet — retrying in 5s (attempt $attempt/5)"
            sleep 5
          done
          echo "::error::No GitHub Release exists for tag $tag. Per the release convention, publish by cutting a GitHub Release (gh release create $tag ...), not a bare tag push. Use workflow_dispatch to override."
          exit 1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: juniper-observability-dist
          path: juniper-observability/dist/
          if-no-files-found: error
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Publish to TestPyPI first; verify install before promoting to PyPI
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/juniper-observability
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: juniper-observability-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          verbose: true

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          sparse-checkout: |
            juniper-observability/pyproject.toml

      - name: Verify install from TestPyPI
        run: |
          set -euo pipefail
          version=$(grep '^version' juniper-observability/pyproject.toml | head -1 | sed -E 's/version = "(.+)"/\1/')
          for attempt in 1 2 3 4 5; do
            if pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              "juniper-observability==${version}"; then
              break
            fi
            echo "TestPyPI index lag — retrying in 10s (attempt ${attempt}/5)"
            sleep 10
          done
          python -c "import juniper_observability; print('TestPyPI install OK', juniper_observability.__version__)"

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/juniper-observability
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: juniper-observability-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: dist/
          verbose: true
