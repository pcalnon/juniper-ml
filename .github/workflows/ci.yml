---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-ml
# File Name:     ci.yml
# Author:        Paul Calnon
# Version:       0.4.0
#
# Date Created:  2026-02-23
# Last Modified: 2026-03-11
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    GitHub Actions CI/CD Pipeline for juniper-ml meta-package.
#    - Pre-commit hooks for code quality (flake8, bandit, shellcheck, yamllint, markdownlint)
#    - Regression tests (Python unittest + bash scripts)
#    - Build and validate (twine check)
#    - Documentation link validation
#    - Security scanning (pip-audit)
#    - Dependency documentation generation
#
#####################################################################################################################################################################################################

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - fix/**
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_TEST_VERSION: "3.12"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Pre-commit: Code Quality Checks
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  pre-commit:
    name: Pre-commit (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install pre-commit

      - name: Cache pre-commit hooks
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Run pre-commit hooks
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-ml - Pre-commit Checks                       ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          pre-commit run --all-files --show-diff-on-failure

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Tests: Run regression tests for scripts and tooling
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  tests:
    name: Regression Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [pre-commit]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          # PyYAML is required by tests/test_workflow_script_paths.py which
          # parses .github/workflows/*.yml.
          pip install "pyyaml>=6.0"
          # packaging is required by tests/test_env_drift_check.py, which
          # dogfoods the juniper-ci-tools env-floor-drift console script as a
          # subprocess (the module imports packaging for SpecifierSet/Version).
          pip install "packaging>=22.0"

      - name: Run Python regression tests
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-ml - Python Regression Tests                 ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          python3 -m unittest -v tests/test_wake_the_claude.py
          # The doc-link validator regression tests were moved out of this
          # repo in Wave 4 of the doc-link migration; coverage now lives
          # in juniper-doc-tools/tests/, exercised by the dedicated
          # `CI -- juniper-doc-tools` workflow.
          python3 -m unittest -v tests/test_worktree_cleanup.py
          python3 -m unittest -v tests/test_worktree_sweep_scripts.py
          python3 -m unittest -v tests/test_reap_pytest_orphans.py
          python3 -m unittest -v tests/test_editable_install_drift_check.py
          # tests/test_env_floor_drift_check.py: gap-I-2 floor-drift checker --
          # installed juniper-* (dist-info METADATA) vs the target repo's pyproject
          # floors. Structural gate only (ubuntu CI has no conda env); a real-env
          # scan is a documented manual-verify step. util/ is not pre-commit-gated.
          python3 -m unittest -v tests/test_env_floor_drift_check.py
          # tests/test_env_drift_check.py: dogfoods the SHARED juniper-ci-tools
          # env-floor-drift console script (juniper-env-drift-check, plan §10.1) end
          # to end against synthetic site-packages + pyproject + requirements.lock
          # fixtures -- exit codes (0 ok / 1 drift / 2 usage), the plain-wheel ==
          # editable equivalence, and --check-lock. juniper-ci-tools/ is outside this
          # repo's flake8/pre-commit scope, so this unittest is the integration gate.
          python3 -m unittest -v tests/test_env_drift_check.py
          # tests/test_env_drift_check_drift.py: STRUCTURAL gate for the
          # juniper-env-drift-check console-script ENTRY POINT (the 0.5.0 #580
          # clobber regression) + a class guard that every juniper_ci_tools/cli*.py
          # has a [project.scripts] entry. Runs in this always-on pytest job because
          # the build-smoke alone missed the 0.5.0 drop. Stdlib only.
          python3 -m unittest -v tests/test_env_drift_check_drift.py
          # tests/test_release_train_registry.py: structural lint + registry<->pyproject
          # drift gate for util/release_train/registry.yaml (PyPI release-train plan
          # §4.1). Always-on structural checks (18 packages, 8 repos incl. recurrence,
          # required fields/enums); the 7 in-repo juniper-ml packages resolve
          # unconditionally, cross-repo entries auto-skip (doc-tools sibling semantics).
          python3 -m unittest -v tests/test_release_train_registry.py
          # tests/test_release_train_detect.py: hermetic tests for the release-train
          # detection engine (util/release_train/detect.py, plan §4.2/4.3) -- every
          # classification, static/dynamic version reads, tag resolution, the
          # substantive-hunk filter, path-scoping, SemVer, manifest shape, exit codes.
          # No network / no real gh / no real pip (all sources injected). util/ is not
          # pre-commit-lint-gated, so this unittest is the gate.
          python3 -m unittest -v tests/test_release_train_detect.py
          # tests/test_release_train_propose.py: hermetic tests for the Phase 2.1 proposal-PR
          # generator (util/release_train/propose.py + notes_render.py, plan §5.4/§6/§10.1) --
          # a well-formed dry-run for a static + a dynamic package, the CHANGELOG [Unreleased]
          # move, template-driven notes + archive-name convention, the gh-pr-list dup-guard,
          # the changelog_conflict refusal, and that a dry-run writes nothing. No network / no
          # real gh / no repo writes (all effects injected). util/ is not pre-commit-lint-gated,
          # so this unittest is the gate.
          python3 -m unittest -v tests/test_release_train_propose.py
          # tests/test_release_train_workflow_guard.py: structural R7 privilege-boundary guard for
          # .github/workflows/release-train.yml (plan §9.3 / §12 step 2.2). Asserts workflow-level
          # permissions are contents:read, the propose job's are exactly {contents:write,
          # pull-requests:write}, its `if` gates on the detect mode output (write path unreachable in
          # report mode), and no secret other than SLACK_WEBHOOK_URL is referenced. PyYAML (installed
          # above); the workflow YAML is not otherwise lint-gated for this property.
          python3 -m unittest -v tests/test_release_train_workflow_guard.py
          # tests/test_prompt_discovery.py: behavioural coverage for the custom-agent
          # suite's discovery helpers (util/prompt_discovery/) -- grounding-bundle schema,
          # provenance envelope, and the test_status cold_cache/empty distinction. util/ is
          # not lint-gated by pre-commit (flake8/black scope to scripts+tests), so this
          # unittest is the gate. Stdlib only (subprocess/tempfile/json).
          python3 -m unittest -v tests/test_prompt_discovery.py
          # tests/test_symbol_overlay.py: deterministic merge for the Serena symbol overlay
          # (util/prompt_discovery/symbol_overlay.py, OQ-8) -- Serena-resolved wins, grep is the
          # fallback, unresolved stays UNRESOLVED, input bundle not mutated. Stdlib only.
          python3 -m unittest -v tests/test_symbol_overlay.py
          # tests/test_generated_prompt_index.py: util/generated_prompt_index.py (P4) -- indexes
          # prompts/generated/ by the emit-name convention + a SAFETY-gated prune (no delete
          # without --yes; .gitkeep/non-convention files never touched; dir read from conventions.yaml).
          python3 -m unittest -v tests/test_generated_prompt_index.py
          # tests/test_thread_handoff_archive.py: drift guard for the archived handoff prompt
          # filename convention and top-level note references to archived handoff prompts.
          python3 -m unittest -v tests/test_thread_handoff_archive.py
          # tests/test_install_agents.py: drives util/install_agents.bash (the ~/.claude
          # mirror, PR 6a) against a synthetic source + throwaway target -- idempotent,
          # reversible, dry-run-safe, no-clobber. Stdlib only (subprocess/tempfile).
          python3 -m unittest -v tests/test_install_agents.py
          # tests/test_agent_suite_doctor.py: the suite health-check utility (util/agent_suite_doctor.py)
          # -- a dogfood that consumes every layer (agents/skill/templates/RUBRIC/data-layer/discovery/
          # mirror). Real-repo-healthy + synthetic-missing-component FAIL + --json/--strict/--no-discovery.
          python3 -m unittest -v tests/test_agent_suite_doctor.py
          # tests/test_agent_suite_summary.py: util/agent_suite_summary.py (P3) -- the suite
          # quick-reference; asserts every agent + template appears, --json round-trips, and
          # --markdown rows respect the 512 line-length. Stdlib + PyYAML.
          python3 -m unittest -v tests/test_agent_suite_summary.py
          # tests/test_requirements_drift_check.py: exercises util/requirements_drift_check.py
          # (the notes/requirements snapshot drift checker; uses the PyYAML installed above).
          # Listed in AGENTS.md's "Run all tests" but never wired into this CI list
          # (audit finding F14) -- added here.
          python3 -m unittest -v tests/test_requirements_drift_check.py
          python3 -m unittest -v tests/test_validate_claude_yaml_access.py
          python3 -m unittest -v tests/test_workflow_script_paths.py
          # tests/test_doc_tools_drift.py: the cross-repo
          # consumer-pin assertions auto-skip when siblings are not
          # cloned (per-PR mode); the helper unit tests + juniper-ml's
          # own pin check still run, catching the case where someone
          # bumps juniper-doc-tools in this same PR but forgets to
          # bump the pin in juniper-ml's own workflows.
          python3 -m unittest -v tests/test_doc_tools_drift.py
          # tests/test_ci_tools_drift.py: same skip semantics as the
          # doc-tools sibling above -- the cross-repo consumer-pin
          # assertion auto-skips when siblings are not cloned, but the
          # helper unit tests + juniper-ml's own pin check still run,
          # catching the case where someone bumps juniper-ci-tools in
          # this same PR but forgets to widen the pin ceiling in
          # juniper-ml's own ci.yml / lockfile-update.yml /
          # docs-full-check.yml. The full cross-repo assertion runs
          # weekly via docs-full-check.yml.
          python3 -m unittest -v tests/test_ci_tools_drift.py
          # tests/test_coverage_gap_mapper_drift.py: dogfood gate for the
          # juniper-coverage-gap-map console script (enhancement E-4 + the C-0
          # enforcing mode; the per-file coverage-gap mapper hosted in
          # juniper-ci-tools). STRUCTURAL: the console script is registered, both
          # module halves ship, _version.py matches pyproject [project].version,
          # juniper-ml's own ci-tools pins admit the current version (the
          # bump-without-widening coupling), and the opt-in --enforce/--fail-under-*
          # /--omit flags are wired. END-TO-END (C-0): invokes the shipped entry over
          # a synthetic coverage.json (primary JSON-parsing path; deterministic in
          # the ubuntu runner) and asserts --enforce exits 1 on a gap / 0 clean, 0 on
          # --help, and 0 for the advisory default. The real CROSS-REPO coverage run
          # still cannot execute here (meta-package; no target repo checked out) -- it
          # stays a documented manual-verify step; the full behavioural matrix is
          # juniper-ci-tools' own pytest suite (synthetic fixtures, ci-ci-tools.yml).
          python3 -m unittest -v tests/test_coverage_gap_mapper_drift.py
          # tests/test_model_core_drift.py + tests/test_service_core_drift.py:
          # same idea as the doc-tools/ci-tools drift lints, but the pin lives in
          # pyproject.toml's [tools] extra (library deps, not CI-workflow installs).
          # Each asserts juniper-ml's [tools] pin still admits the current in-repo
          # version of the shared-core package. (test_model_core_drift.py shipped in
          # #418 but was never wired into this list -- fixed here alongside the
          # service-core sibling added with juniper-service-core 0.1.0.)
          python3 -m unittest -v tests/test_model_core_drift.py
          python3 -m unittest -v tests/test_service_core_drift.py
          # tests/test_pyproject_extras.py: pins the
          # [project.optional-dependencies] surface so accidental edits
          # to extras (drop, mistype, fail to roll up into [all]) fail
          # loudly. Added pre-0.5.0 after juniper-ml#295 introduced
          # [servers] + [tools] without regression coverage.
          python3 -m unittest -v tests/test_pyproject_extras.py
          # tests/test_template_library_drift.py: enforces manifest <-> template
          # consistency for the custom-agent template library (prompts/agent_templates/).
          # The SOLE gate for that library because prompts/** is excluded from all
          # pre-commit hooks; uses the PyYAML installed above.
          python3 -m unittest -v tests/test_template_library_drift.py
          # tests/test_template_selection.py: validates manifest match_signals coherence
          # (companion gate to the library drift test; uses the PyYAML installed above).
          python3 -m unittest -v tests/test_template_selection.py
          # tests/test_template_select_preview.py: drives util/template_select_preview.py (the
          # offline match_signals selector, P2) against the real manifest -- keyword pick,
          # generic fallback, ranked list excludes the always-match, CLI JSON shape. Stdlib+yaml.
          python3 -m unittest -v tests/test_template_select_preview.py
          # tests/test_template_data_resolver.py: tests the custom-agent suite data layer
          # (prompts/agent_templates/data/*.yaml) + util/template_data_resolver.py loader/resolve;
          # also a drift gate (line-length + handoff threshold must match repo reality).
          # prompts/** is excluded from all pre-commit hooks, so this is the data layer's gate.
          python3 -m unittest -v tests/test_template_data_resolver.py
          # tests/test_scaffold_template.py: util/scaffold_template.py (P5) -- the generated
          # template passes the real library-drift helpers (skeleton+placeholders); --dry-run,
          # refuse-on-collision, and the tool NEVER edits manifest.yaml (prints the stanza).
          python3 -m unittest -v tests/test_scaffold_template.py
          # tests/test_prompt_validator_contract.py: static contract test for the
          # prompt-validator subagent (.claude/agents/prompt-validator.md) + its pinned
          # verdict JSON schema/fixtures (tests/fixtures/prompt_validator/). Asserts the
          # frontmatter shape (read-only+Bash tools, pinned model), that every rubric ID
          # the agent cites exists in RUBRIC.md, and that the schema + PASS/FAIL samples
          # conform to the design S5.3 contract. The behavioural gate for the validator
          # surface: .claude/** is git-tracked via the PR-1 .gitignore negation but is
          # excluded from every pre-commit hook except markdownlint. Uses PyYAML above.
          python3 -m unittest -v tests/test_prompt_validator_contract.py
          # tests/test_template_agent_skill_lint.py: static lint for the template-agent
          # Skill (.claude/skills/template-agent/SKILL.md) -- frontmatter (opus + effort max,
          # Agent in allowed-tools, user-only) and that its bounded state machine wires to
          # real artifacts (template library, RUBRIC, discovery CLI, validator subagent).
          # The gate for the Skill surface (excluded from pre-commit except markdownlint).
          python3 -m unittest -v tests/test_template_agent_skill_lint.py
          # tests/test_service_smoke_skill_lint.py: structural gate for the E-1 Stage-1/2
          # service-smoke Skill (.claude/skills/service-smoke/SKILL.md) -- frontmatter (opus +
          # effort max, user-only, base tool set + a DECLARED browser MCP for the opt-in --ui
          # smoke, NO Agent), wiring to the real teardown utilities, an explicit teardown step
          # (browser close + reap), and the documented UI smoke. Live boot cannot run in ubuntu
          # CI (no conda/services/browser); gate is structural-only + a manual smoke-verify.
          python3 -m unittest -v tests/test_service_smoke_skill_lint.py
          # tests/test_ui_test_author_skill_lint.py: structural gate for the E-6
          # ui-test-author Skill (.claude/skills/ui-test-author/SKILL.md) -- frontmatter (opus +
          # effort max, user-only, tool set incl. Write + a DECLARED browser MCP, NO Agent),
          # teardown wiring + browser-close, modelling on canopy's src/tests/ui/ harness
          # (dashboard_page / @pytest.mark.ui / the dbc.Input wall), and the reviewed-never-merged
          # contract. Live authoring can't run in ubuntu CI (no conda/app/browser); structural-only.
          python3 -m unittest -v tests/test_ui_test_author_skill_lint.py
          # tests/test_agents_frontmatter.py: suite-wide gate over every .claude/agents/*.md
          # (validator + round-2 planner/auditor/task-executor) -- name==filename, substantive
          # description, tools declared, body non-trivial, and the owner defaults model=opus +
          # effort=max. .claude/** is pre-commit-excluded except markdownlint, so this is the gate.
          python3 -m unittest -v tests/test_agents_frontmatter.py
          # tests/test_agent_suite_path_drift.py: regression guard asserting no live
          # suite file under .claude/agents/, .claude/skills/, or prompts/agent_templates/
          # still references the pre-rename prompts/templates/ path (the validator was
          # pointed at a nonexistent RUBRIC/manifest). .claude/** + prompts/** are
          # pre-commit-excluded (except markdownlint), so this unittest is the gate.
          python3 -m unittest -v tests/test_agent_suite_path_drift.py
          # tests/test_agents_md_version_drift.py: pins AGENTS.md's
          # `**Version**:` header to pyproject.toml's [project].version
          # so version bumps stay in sync with the agent-facing
          # contract. Added after juniper-ml#295 bumped pyproject to
          # 0.5.0 but left AGENTS.md at 0.4.0 for ~6 days (fixed in
          # juniper-ml#304); this lint makes the drift impossible to
          # ship.
          python3 -m unittest -v tests/test_agents_md_version_drift.py
          # tests/test_agents_md_header_schema.py: pins AGENTS.md's
          # canonical header schema (Project / Repository / Author /
          # License / Version / Last Updated, in that relative order)
          # so the agent-facing contract has a guaranteed shape. The
          # Last Updated field's currency is maintained by the
          # `.github/workflows/agents-md-touch-up.yml` workflow,
          # which auto-bumps on each PR push touching AGENTS.md.
          python3 -m unittest -v tests/test_agents_md_header_schema.py
          # tests/test_agents_md_tree_drift.py: gap-G-3 guard -- every tracked
          # non-hidden top-level dir must appear in AGENTS.md's Repository-Structure
          # tree (catches the indented-tree omission the grep path-drift guard cannot).
          python3 -m unittest -v tests/test_agents_md_tree_drift.py
          # tests/test_juniper_plant_all.py + tests/test_juniper_chop_all.py: stdlib-only static tests of
          # the util/juniper_{plant,chop}_all.bash service launchers (bash -n syntax + script-text
          # assertions + a synthetic tempdir conda fixture; no real services or network). Shipped but
          # never wired into this list (audit finding F14) -- added here; both pass on 3.12-3.14.
          python3 -m unittest -v tests/test_juniper_plant_all.py
          python3 -m unittest -v tests/test_juniper_chop_all.py

      - name: Run bash regression tests
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-ml - Bash Regression Tests                   ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          bash scripts/test_resume_file_safety.bash

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Build: Build the package and validate with twine
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  build:
    name: Build and Validate Package
    runs-on: ubuntu-latest
    needs: [pre-commit]
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_TEST_VERSION }}

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-ml - Build Package                           ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          python -m build

      - name: Validate package
        run: twine check dist/*

      - name: Verify installable (editable)
        run: pip install -e .

      - name: Verify extras metadata is declared
        run: |
          python -c "
          import importlib.metadata
          meta = importlib.metadata.metadata('juniper-ml')
          extras = importlib.metadata.requires('juniper-ml') or []
          print('Declared extras:', meta.get_all('Provides-Extra'))
          print('Requirements:', extras)
          assert 'clients' in (meta.get_all('Provides-Extra') or []), 'clients extra missing'
          assert 'worker' in (meta.get_all('Provides-Extra') or []), 'worker extra missing'
          print('All extras verified.')
          "

      - name: Upload dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Docs: Validate documentation link integrity
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  docs:
    name: Documentation Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_TEST_VERSION }}

      # Wave 2 of the doc-link migration plan
      # (notes/JUNIPER_2026-05-18_JUNIPER-ML_DOC-TOOLS-PYPI-MIGRATION-PLAN.md): the
      # validator is installed from PyPI instead of run from the inline
      # util/check_doc_links.py copy. The inline copy stays in place
      # through Wave 4 so this swap remains a one-line revert.
      - name: Install juniper-doc-tools
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install "juniper-doc-tools>=0.1.0,<0.2.0"

      - name: Validate Documentation Links
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-ml - Documentation Link Validation           ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          juniper-check-doc-links \
            --exclude templates \
            --exclude history \
            --exclude legacy \
            --exclude pull_requests \
            --exclude releases \
            --exclude analysis \
            --exclude fixes \
            --exclude development \
            --exclude CHANGELOG.md \
            --cross-repo skip

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Security: pip-audit for dependency vulnerabilities
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_TEST_VERSION }}

      - name: Run pip-audit
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-ml - pip-audit Security Scan                 ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          python -m pip install --upgrade "pip>=26.1.1"
          pip install pip-audit
          pip install -e .
          # --skip-editable so the meta-package itself (installed as editable)
          # is not audited; pip-audit would otherwise try to look juniper-ml up
          # on PyPI by name and fail for unreleased versions.
          #
          # --strict is intentionally omitted: pip-audit counts a skipped
          # editable install as "dependency collection failure", and --strict
          # would escalate that to a fatal error. Real vulnerabilities still
          # cause exit 1 without --strict.
          pip-audit --desc on --skip-editable

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Claude.yml access audit: structurally validates the live
  # .github/workflows/claude.yml against the L2/L3 safeguards from
  # notes/JUNIPER_2026-05-10_JUNIPER-ECOSYSTEM_ANTHROPIC-API-KEY-ACCESS-VALIDATION-WALKTHROUGH.md.
  # The validator's unit tests already run inside the `tests:` matrix;
  # this job additionally exercises the script against the real claude.yml
  # so a regression in the workflow file itself blocks merge.
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  claude-yaml-audit:
    name: Claude.yml Access Audit
    runs-on: ubuntu-latest
    needs: [pre-commit]
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate .github/workflows/claude.yml
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-ml - claude.yml Public-Repo Access Audit     ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          bash util/validate_claude_yaml_access.bash .github/workflows/claude.yml

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Dependency Documentation: Generate pip dependency records
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  dependency-docs:
    name: Dependency Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ env.PYTHON_TEST_VERSION }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_TEST_VERSION }}
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install -e .

      # Wave 2 of the dep-docs PyPI migration (plan
      # notes/JUNIPER_2026-05-20_JUNIPER-ML_CI-TOOLS-PYPI-MIGRATION-PLAN.md):
      # invoke the PyPI-published juniper-ci-tools console script
      # instead of the inline util/generate_dep_docs.sh. The inline
      # script will be removed from the tree in Wave 4 once the new
      # step has soaked. Pinned <0.2.0 so a future major bump can be
      # adopted deliberately per-repo.
      - name: Install juniper-ci-tools
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install "juniper-ci-tools>=0.1.0,<0.7.0"

      - name: Generate Dependency Documentation
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-ml - Dependency Documentation                ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          juniper-generate-dep-docs

      - name: Upload Dependency Documentation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: dependency-docs
          path: |
            conf/requirements_ci.txt
            conf/requirements_ci_*.txt
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Quality Gate: All required checks must pass
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  required-checks:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [pre-commit, tests, build, docs, security, claude-yaml-audit, dependency-docs]
    steps:
      - name: Check Quality Gate Status
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-ml - Quality Gate Status                     ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "Pre-commit:           ${{ needs.pre-commit.result }}"
          echo "Tests:                ${{ needs.tests.result }}"
          echo "Build:                ${{ needs.build.result }}"
          echo "Docs:                 ${{ needs.docs.result }}"
          echo "Security:             ${{ needs.security.result }}"
          echo "Claude.yml Audit:     ${{ needs.claude-yaml-audit.result }}"
          echo "Dependency Docs:      ${{ needs.dependency-docs.result }}"
          echo ""

          if [[ "${{ needs.pre-commit.result }}" != "success" ]]; then
            echo "::error::Pre-commit checks failed"
            exit 1
          fi

          if [[ "${{ needs.tests.result }}" != "success" ]]; then
            echo "::error::Regression tests failed"
            exit 1
          fi

          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "::error::Package build/validation failed"
            exit 1
          fi

          if [[ "${{ needs.docs.result }}" != "success" ]]; then
            echo "::error::Documentation link validation failed"
            exit 1
          fi

          # Security: failure = error, skipped = OK
          if [[ "${{ needs.security.result }}" == "failure" ]]; then
            echo "::error::Security scan failed"
            exit 1
          fi

          if [[ "${{ needs.claude-yaml-audit.result }}" != "success" ]]; then
            echo "::error::Claude.yml access audit failed"
            exit 1
          fi

          if [[ "${{ needs.dependency-docs.result }}" != "success" ]]; then
            echo "::error::Dependency documentation generation failed"
            exit 1
          fi

          echo "::notice::Quality Gate PASSED"
