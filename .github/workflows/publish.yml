---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-ml
# File Name:     publish.yml
# Author:        Paul Calnon
# Version:       0.2.0
#
# Date Created:  2026-02-23
# Last Modified: 2026-03-01
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    GitHub Actions publish pipeline for juniper-ml meta-package.
#    Triggered by GitHub release. Publishes TestPyPI first (with install
#    verification), then PyPI. Uses OIDC trusted publishing (no API tokens).
#
#####################################################################################################################################################################################################

name: Publish to PyPI

on:
  release:
    types: [published]
  # Allow manual dispatch so operators can re-fire a publish against any tag
  # (useful when a release-triggered run failed and the release is immutable
  # or the original run is non-retriable). Run via:
  #   gh workflow run publish.yml --repo pcalnon/juniper-ml --ref <tag>
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Build: Validate the package before publishing
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # TestPyPI: Publish and verify install
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true

      - name: Verify TestPyPI install
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          sleep 30
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ juniper-ml==${VERSION}
          python -c "import importlib.metadata; print(f'TestPyPI OK: juniper-ml v{importlib.metadata.version(\"juniper-ml\")}')"

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # PyPI: Publish after TestPyPI verification
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  pypi:
    name: Publish to PyPI
    needs: testpypi
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
        with:
          attestations: true
