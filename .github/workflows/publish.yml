---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-ml
# File Name:     publish.yml
# Author:        Paul Calnon
# Version:       0.2.0
#
# Date Created:  2026-02-23
# Last Modified: 2026-03-01
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    GitHub Actions publish pipeline for juniper-ml meta-package.
#    Triggered by GitHub release. Publishes TestPyPI first (with install
#    verification), then PyPI. Uses OIDC trusted publishing (no API tokens).
#
#####################################################################################################################################################################################################

name: Publish to PyPI

on:
  release:
    types: [published]
  # Allow manual dispatch so operators can re-fire a publish against any tag
  # (useful when a release-triggered run failed and the release is immutable
  # or the original run is non-retriable). Run via:
  #   gh workflow run publish.yml --repo pcalnon/juniper-ml --ref <tag>
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Build: Validate the package before publishing
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  build:
    name: Build and Validate
    # Release-convention guard: publish juniper-ml only for meta-package `v*` releases, NOT for a
    # shared/sub-package `juniper-<pkg>-v*` release (which also fires this release-triggered workflow).
    # workflow_dispatch is the manual escape hatch.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # TestPyPI: Publish and verify install
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true

      - name: Verify TestPyPI install
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          sleep 30
          # Step 1: bare-package install. Confirms the wheel/sdist is on
          # TestPyPI and importlib.metadata sees the expected version.
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ "juniper-ml==${VERSION}"
          python -c "import importlib.metadata; print(f'TestPyPI bare OK: juniper-ml v{importlib.metadata.version(\"juniper-ml\")}')"
          # Step 2: [clients] extras-resolution install. Exercises the
          # [project.optional-dependencies] surface against the published
          # metadata so a broken extras declaration (mistyped name, missing
          # roll-up into [all], dangling self-reference) fails the publish
          # rather than landing on PyPI silently. [clients] is one of two
          # light extras (data-client + cascor-client, no torch); it walks
          # the full resolver path. Both deps are already on production
          # PyPI so the --extra-index-url is what actually serves them.
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ "juniper-ml[clients]==${VERSION}"
          python -c "import juniper_data_client, juniper_cascor_client; print(f'TestPyPI extras OK: [clients] resolved data-client={juniper_data_client.__version__ if hasattr(juniper_data_client, \"__version__\") else \"?\"}, cascor-client={juniper_cascor_client.__version__ if hasattr(juniper_cascor_client, \"__version__\") else \"?\"}')"
          # Step 3: [tools] extras-resolution install. Pairs with step 2
          # to cover both light extras at publish time -- if [tools] were
          # broken, step 2 would still pass and ship. juniper-ci-tools,
          # juniper-doc-tools, juniper-observability are all small and
          # already on production PyPI; no torch involved.
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ "juniper-ml[tools]==${VERSION}"
          python -c "import juniper_ci_tools, juniper_doc_tools, juniper_observability; print(f'TestPyPI extras OK: [tools] resolved ci-tools={juniper_ci_tools.__version__ if hasattr(juniper_ci_tools, \"__version__\") else \"?\"}, doc-tools={juniper_doc_tools.__version__ if hasattr(juniper_doc_tools, \"__version__\") else \"?\"}, observability={juniper_observability.__version__ if hasattr(juniper_observability, \"__version__\") else \"?\"}')"

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # PyPI: Publish after TestPyPI verification
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  pypi:
    name: Publish to PyPI
    needs: testpypi
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          attestations: true
