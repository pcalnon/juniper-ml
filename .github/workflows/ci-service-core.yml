---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-service-core (subdirectory of juniper-ml)
# File Name:     ci-service-core.yml
# Author:        Paul Calnon
#
# Date Created:  2026-06-14
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    CI pipeline for the juniper-service-core shared library (WS-2 of the
#    model/middleware refactor). Runs on PRs and pushes that touch the package
#    or its tests. The juniper-ml meta-package's own ci.yml continues to gate
#    the meta-package; this workflow handles the shared-lib lifecycle
#    independently, mirroring ci-observability.yml.
#
#####################################################################################################################################################################################################

name: CI — juniper-service-core

on:
  push:
    branches: [main]
    paths:
      - "juniper-service-core/**"
      - ".github/workflows/ci-service-core.yml"
  pull_request:
    branches: [main]
    paths:
      - "juniper-service-core/**"
      - ".github/workflows/ci-service-core.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test extras
        run: |
          pip install --upgrade "pip>=26.1.1"
          # juniper-service-core depends on juniper-model-core, which is not yet on PyPI;
          # install the sibling editable first so the dependency resolves inside the monorepo
          # (publish-first: model-core ships to PyPI before service-core).
          pip install -e juniper-model-core
          pip install -e "juniper-service-core/.[test]"

      - name: Run unit tests
        run: pytest juniper-service-core/tests/ -v --cov=juniper_service_core --cov-report=term-missing --cov-report=json:coverage.json --cov-fail-under=80

      - name: Enforce per-file coverage gate (blocking)
        # Per-file coverage rollout C-4 (juniper-ml
        # notes/JUNIPER_ECOSYSTEM_PER_FILE_COVERAGE_ROLLOUT_SCOPING_2026-06-30.md):
        # exit 1 if any source file's statement coverage < 90 OR a
        # sub-module's pooled (statement-weighted) coverage < 95.
        run: |
          pip install "juniper-ci-tools>=0.6.0,<0.7.0"
          juniper-coverage-gap-map --coverage-json coverage.json --enforce

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: juniper-service-core
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel

      - name: Validate distribution metadata
        run: twine check dist/*
