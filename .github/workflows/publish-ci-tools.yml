---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-ci-tools (subdirectory of juniper-ml)
# File Name:     publish-ci-tools.yml
# Author:        Paul Calnon
#
# Date Created:  2026-05-20
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    GitHub Actions publish pipeline for the juniper-ci-tools package
#    (Wave 1 of the dependency-documentation generator PyPI migration --
#    see notes/JUNIPER_2026-05-20_JUNIPER-ML_CI-TOOLS-PYPI-MIGRATION-PLAN.md).
#    Triggered by tags matching ``juniper-ci-tools-v*`` so it stays
#    decoupled from the juniper-ml meta-package's own ``v*`` release
#    tags. Publishes to TestPyPI first (with install verification),
#    then PyPI, via OIDC trusted publishing. Mirrors publish-doc-tools.yml.
#
#####################################################################################################################################################################################################

name: Publish juniper-ci-tools to PyPI

on:
  # Publish ONLY on a cut GitHub Release (the ratified convention — never a bare `git push <tag>`).
  # We deliberately do NOT subscribe to `push: tags`: cutting a Release also creates the tag, which
  # emits a `push: tags` event — subscribing to both fired TWO concurrent publish runs that raced the
  # immutable TestPyPI upload (one uploaded, the other 400'd "file already exists"; see #555). The
  # build job is tag-prefix-guarded below; `release: published` is the single publish path.
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  # Belt-and-suspenders serialization keyed on the ref. The primary dedupe is the single
  # `release: published` trigger above; `skip-existing` on the publish steps makes any residual
  # overlap (e.g. a manual dispatch during a release) a no-op rather than an immutable-upload race.
  group: publish-ci-tools-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and Validate
    # Run for a tag push (filtered above) or workflow_dispatch; for a `release` event, only when the
    # release is THIS package's tag -- a release for another package (or the meta `v*` release) also
    # fires this workflow and must be skipped. Downstream jobs `needs: build`, so this one guard
    # gates the whole pipeline.
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, 'juniper-ci-tools-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: juniper-ci-tools
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Release-convention gate: a tag-triggered publish only proceeds when a GitHub Release exists
      # for the tag (publish by cutting a Release, never a bare `git push <tag>`). workflow_dispatch
      # skips this as the manual escape hatch.
      - name: Require a GitHub Release for this tag
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          for attempt in 1 2 3 4 5; do
            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json tagName >/dev/null 2>&1; then
              echo "GitHub Release found for $tag — proceeding."
              exit 0
            fi
            echo "No GitHub Release for $tag yet — retrying in 5s (attempt $attempt/5)"
            sleep 5
          done
          echo "::error::No GitHub Release exists for tag $tag. Per the release convention, publish by cutting a GitHub Release (gh release create $tag ...), not a bare tag push. Use workflow_dispatch to override."
          exit 1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: juniper-ci-tools-dist
          path: juniper-ci-tools/dist/
          if-no-files-found: error
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/juniper-ci-tools
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: juniper-ci-tools-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          verbose: true
          skip-existing: true  # tolerate an already-uploaded immutable artifact (re-run / overlap)

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          sparse-checkout: |
            juniper-ci-tools/pyproject.toml

      - name: Verify install from TestPyPI
        run: |
          set -euo pipefail
          version=$(grep '^version' juniper-ci-tools/pyproject.toml | head -1 | sed -E 's/version = "(.+)"/\1/')
          # NOTE (security): install with --no-deps against TestPyPI only. Do NOT add a
          # production-PyPI fallback index here — with --no-deps no deps are fetched, so a
          # fallback only risks resolving a squatted target package. The retry loop below
          # covers TestPyPI index lag.
          for attempt in 1 2 3 4 5; do
            if pip install \
              --no-deps \
              --index-url https://test.pypi.org/simple/ \
              "juniper-ci-tools==${version}"; then
              break
            fi
            echo "TestPyPI index lag — retrying in 10s (attempt ${attempt}/5)"
            sleep 10
          done
          # --no-deps leaves runtime deps (PyYAML, packaging) absent, so importing the package
          # or running its console scripts (which import juniper_ci_tools.generate_dep_docs -> yaml)
          # fails here. Read the installed version from dist-info METADATA instead (imports no
          # package code); the full import / console-script exercise runs in the package's CI tests.
          python -c "import importlib.metadata as m; print('TestPyPI install OK', m.version('juniper-ci-tools'))"

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/juniper-ci-tools
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: juniper-ci-tools-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: dist/
          verbose: true
          skip-existing: true  # tolerate an already-uploaded immutable artifact (re-run / overlap)
