---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-service-core (subdirectory of juniper-ml)
# File Name:     publish-service-core.yml
# Author:        Paul Calnon
#
# Date Created:  2026-06-14
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    GitHub Actions publish pipeline for the juniper-service-core package
#    (WS-2 of the model/middleware refactor). Triggered by tags matching
#    ``juniper-service-core-v*`` so it stays decoupled from the juniper-ml
#    meta-package's own ``v*`` release tags. Publishes to TestPyPI first
#    (with install verification), then PyPI, via OIDC trusted publishing.
#
#    SECURITY: the TestPyPI install-verification step installs with
#    ``--no-deps`` and verifies only the version. It MUST NOT add a
#    production-PyPI fallback index (no extra-index pointing at the public
#    PyPI simple index) — with --no-deps no dependencies are fetched, so a
#    fallback serves no purpose and would only let a squatted production-PyPI
#    package be resolved during a trusted publish. TestPyPI index lag is
#    handled by the retry loop instead.
#    (Enforced by tests/test_workflow_script_paths.py.)
#
#####################################################################################################################################################################################################

name: Publish juniper-service-core to PyPI

on:
  push:
    tags:
      - "juniper-service-core-v*"
  # Cutting a GitHub Release auto-fires the publish: `gh release create` does NOT emit a
  # `push: tags` event for the new tag, so this `release` trigger is what makes "cut a Release"
  # publish without a manual workflow_dispatch. Guarded to this package's tag prefix (build job).
  release:
    types: [published]
  # Manual dispatch so operators can re-fire a publish against any tag.
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  # Serialize publishes for a given tag: a tag-push and a release event for the SAME tag share this
  # group (github.ref_name is the bare tag for both), so they cannot race the immutable upload.
  # Different tags use different groups and never block each other.
  group: publish-service-core-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Build + validate the package before publishing
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  build:
    name: Build and Validate
    # Run for a tag push (filtered above) or workflow_dispatch; for a `release` event, only when the
    # release is THIS package's tag -- a release for another package (or the meta `v*` release) also
    # fires this workflow and must be skipped. Downstream jobs `needs: build`, so this one guard
    # gates the whole pipeline.
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, 'juniper-service-core-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: juniper-service-core
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Release-convention gate: a tag-triggered publish only proceeds when a GitHub Release exists
      # for the tag (publish by cutting a Release, never a bare `git push <tag>`). workflow_dispatch
      # skips this as the manual escape hatch.
      - name: Require a GitHub Release for this tag
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          for attempt in 1 2 3 4 5; do
            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json tagName >/dev/null 2>&1; then
              echo "GitHub Release found for $tag — proceeding."
              exit 0
            fi
            echo "No GitHub Release for $tag yet — retrying in 5s (attempt $attempt/5)"
            sleep 5
          done
          echo "::error::No GitHub Release exists for tag $tag. Per the release convention, publish by cutting a GitHub Release (gh release create $tag ...), not a bare tag push. Use workflow_dispatch to override."
          exit 1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: juniper-service-core-dist
          path: juniper-service-core/dist/
          if-no-files-found: error
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Publish to TestPyPI first; verify install before promoting to PyPI
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/juniper-service-core
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: juniper-service-core-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          verbose: true

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          sparse-checkout: |
            juniper-service-core/pyproject.toml

      - name: Verify install from TestPyPI
        run: |
          set -euo pipefail
          version=$(grep '^version' juniper-service-core/pyproject.toml | head -1 | sed -E 's/version = "(.+)"/\1/')
          # NOTE (security): install with --no-deps against TestPyPI only. Do NOT add a
          # production-PyPI fallback index here — with --no-deps no deps are fetched, so a
          # fallback only risks resolving a squatted target package. The retry loop below
          # covers TestPyPI index lag.
          for attempt in 1 2 3 4 5; do
            if pip install \
              --no-deps \
              --index-url https://test.pypi.org/simple/ \
              "juniper-service-core==${version}"; then
              break
            fi
            echo "TestPyPI index lag — retrying in 10s (attempt ${attempt}/5)"
            sleep 10
          done
          python -c "import juniper_service_core; print('OK', juniper_service_core.__version__)"

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/juniper-service-core
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: juniper-service-core-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: dist/
          verbose: true
