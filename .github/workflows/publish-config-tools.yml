---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-config-tools (subdirectory of juniper-ml)
# File Name:     publish-config-tools.yml
# Author:        Paul Calnon
#
# Date Created:  2026-05-22
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    GitHub Actions publish pipeline for the juniper-config-tools
#    package (Wave 1 of the env-var alias-with-deprecation helper PyPI
#    migration -- see
#    notes/JUNIPER_CONFIG_TOOLS_PYPI_MIGRATION_PLAN_2026-05-22.md).
#    Triggered by tags matching ``juniper-config-tools-v*`` so it stays
#    decoupled from the juniper-ml meta-package's own ``v*`` release
#    tags. Publishes to TestPyPI first (with install verification),
#    then PyPI, via OIDC trusted publishing. Mirrors publish-ci-tools.yml
#    and publish-doc-tools.yml.
#
#####################################################################################################################################################################################################

name: Publish juniper-config-tools to PyPI

on:
  push:
    tags:
      - "juniper-config-tools-v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: juniper-config-tools
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: juniper-config-tools-dist
          path: juniper-config-tools/dist/
          if-no-files-found: error
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/juniper-config-tools
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: juniper-config-tools-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          verbose: true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: |
            juniper-config-tools/pyproject.toml

      - name: Verify install from TestPyPI
        run: |
          set -euo pipefail
          version=$(grep '^version' juniper-config-tools/pyproject.toml | head -1 | sed -E 's/version = "(.+)"/\1/')
          for attempt in 1 2 3 4 5; do
            if pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              "juniper-config-tools==${version}"; then
              break
            fi
            echo "TestPyPI index lag — retrying in 10s (attempt ${attempt}/5)"
            sleep 10
          done
          python -c "import juniper_config_tools; print('TestPyPI install OK', juniper_config_tools.__version__)"
          python -m juniper_config_tools --version

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/juniper-config-tools
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: juniper-config-tools-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: dist/
          verbose: true
