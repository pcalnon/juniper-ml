---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-ml
# File Name:     docs-full-check.yml
# Author:        Paul Calnon
# Version:       0.1.0
#
# Date Created:  2026-03-07
# Last Modified: 2026-03-07
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    Scheduled full documentation link validation including cross-repo links.
#    Clones all Juniper ecosystem sibling repos into the workspace and runs
#    check_doc_links.py with --cross-repo check to validate cross-repo links
#    that are skipped during normal PR CI.
#
#    This is a non-blocking, informational workflow. It runs on a weekly
#    schedule and on manual dispatch only -- it does NOT run on PRs.
#
# Security Notes:
#    - Runs on schedule/dispatch only (not on PRs or forks)
#    - Clones public repos via HTTPS (read-only, no tokens needed)
#    - Minimal permissions (contents: read)
#    - See CROSS_REPO_LINK_RESOLUTION_PROPOSAL.md for security analysis
#
# References:
#    - CROSS_REPO_LINK_RESOLUTION_PROPOSAL.md (Phase 2)
#####################################################################################################################################################################################################

name: Docs Full Check

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_TEST_VERSION: "3.12"

  # Juniper ecosystem repos to clone for cross-repo link validation.
  # Uses newline-separated list for shell iteration.
  ECOSYSTEM_REPOS: |
    juniper-data
    juniper-cascor
    juniper-canopy
    juniper-data-client
    juniper-cascor-client
    juniper-cascor-worker
    juniper-deploy

jobs:
  full-validation:
    name: Full Documentation Link Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout juniper-ml
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: juniper-ml

      - name: Set up Python ${{ env.PYTHON_TEST_VERSION }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_TEST_VERSION }}

      - name: Clone ecosystem sibling repos (shallow, read-only)
        run: |
          cd "$GITHUB_WORKSPACE"
          echo "$ECOSYSTEM_REPOS" | while IFS= read -r repo; do
            [ -z "$repo" ] && continue
            echo "Cloning $repo..."
            git clone --depth 1 "https://github.com/${{ github.repository_owner }}/$repo.git" "$repo" 2>&1 || echo "WARNING: Failed to clone $repo (may not exist or be private)"
          done
          echo ""
          echo "Workspace contents:"
          ls -1 "$GITHUB_WORKSPACE"

      - name: Validate all documentation links (cross-repo check)
        run: |
          cd "$GITHUB_WORKSPACE/juniper-ml"
          python scripts/check_doc_links.py --exclude templates --exclude history --cross-repo check
