---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-ml
# File Name:     docs-full-check.yml
# Author:        Paul Calnon
# Version:       0.1.0
#
# Date Created:  2026-03-07
# Last Modified: 2026-03-07
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    Scheduled cross-repo audits that the per-PR pipelines cannot run on
#    their own. Clones all Juniper ecosystem sibling repos into the
#    workspace and runs:
#      1. juniper-check-doc-links --cross-repo check (from PyPI)
#         — validates cross-repo markdown links skipped during normal PR CI.
#      2. juniper-doc-tools consumer-version-pin lint (§5.1)
#         — asserts every consumer repo's ci.yml pin still admits the
#           current juniper-doc-tools version; soft-warns when a pin
#           lags by more than 2 minor versions.
#      3. juniper-doc-tools downstream-consumer integration (§5.2)
#         — installs juniper-doc-tools and runs juniper-check-doc-links
#           against every cloned consumer repo's docs. Tolerates per-
#           repo failures up to a configurable threshold; flags
#           catastrophic regressions across the ecosystem.
#      4. juniper-ci-tools consumer-version-pin lint (§5.1, ci-tools)
#         — asserts every consumer repo's ci.yml pin still admits the
#           current juniper-ci-tools version (mirrors step 2 for the
#           dep-docs generator package).
#      5. juniper-ci-tools downstream-consumer integration (§5.2, ci-tools)
#         — installs juniper-ci-tools and runs juniper-generate-dep-docs
#           against every cloned consumer repo. Per-repo failure
#           threshold modeled on step 3.
#      6. validate_claude_yaml_access.bash (JUNIPER_ROOT mode)
#         — fans out the L2/L3 claude.yml safeguard audit (no
#           pull_request_target/workflow_run, @claude if-guard) across
#           every Juniper repo, catching drift in sibling repos that
#           juniper-ml's per-PR claude-yaml-audit job cannot see.
#
#    Runs on a weekly schedule and on manual dispatch only -- it does
#    NOT run on PRs. Both audits are blocking (exit non-zero on any
#    finding); the schedule/dispatch trigger keeps developer velocity
#    unaffected.
#
# Security Notes:
#    - Runs on schedule/dispatch only (not on PRs or forks)
#    - Clones public repos via HTTPS (read-only, no tokens needed)
#    - Minimal permissions (contents: read)
#    - See CROSS_REPO_LINK_RESOLUTION_PROPOSAL.md for security analysis
#
# References:
#    - CROSS_REPO_LINK_RESOLUTION_PROPOSAL.md (Phase 2)
#    - notes/ANTHROPIC_API_KEY_ACCESS_VALIDATION_WALKTHROUGH_2026-05-10.md (§7)
#####################################################################################################################################################################################################

name: Docs Full Check

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_TEST_VERSION: "3.12"

  # Juniper ecosystem repos to clone for cross-repo link validation.
  # Uses newline-separated list for shell iteration.
  ECOSYSTEM_REPOS: |
    juniper-data
    juniper-cascor
    juniper-canopy
    juniper-data-client
    juniper-cascor-client
    juniper-cascor-worker
    juniper-deploy

jobs:
  full-validation:
    name: Full Documentation Link Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout juniper-ml
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: juniper-ml

      - name: Set up Python ${{ env.PYTHON_TEST_VERSION }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_TEST_VERSION }}

      - name: Clone ecosystem sibling repos (shallow, read-only)
        run: |
          cd "$GITHUB_WORKSPACE"
          echo "$ECOSYSTEM_REPOS" | while IFS= read -r repo; do
            [ -z "$repo" ] && continue
            echo "Cloning $repo..."
            git clone --depth 1 "https://github.com/${{ github.repository_owner }}/$repo.git" "$repo" 2>&1 || echo "WARNING: Failed to clone $repo (may not exist or be private)"
          done
          echo ""
          echo "Workspace contents:"
          ls -1 "$GITHUB_WORKSPACE"

      # Wave 2 / Wave 4 of the doc-link migration plan
      # (notes/JUNIPER_DOC_TOOLS_PYPI_MIGRATION_PLAN_2026-05-18.md): the
      # validator is installed from PyPI instead of run from the deleted
      # scripts/check_doc_links.py inline copy.
      - name: Install juniper-doc-tools
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install "juniper-doc-tools>=0.1.0,<0.2.0"

      - name: Validate all documentation links (cross-repo check)
        run: |
          cd "$GITHUB_WORKSPACE/juniper-ml"
          juniper-check-doc-links --exclude templates --exclude history --exclude legacy --cross-repo check

      # Plan §5.1 -- consumer-version-pin lint. Walks each cloned
      # consumer repo's ci.yml, extracts the ``juniper-doc-tools>=X,<Y``
      # pin, and asserts the range still admits the current version
      # (read from juniper-doc-tools/pyproject.toml in this checkout).
      # Soft-warns on pins more than 2 minors behind current; hard-fails
      # when a pin's upper bound excludes the current release.
      - name: Lint doc-tools pins across consumer repos
        run: |
          cd "$GITHUB_WORKSPACE/juniper-ml"
          python3 -m unittest -v tests/test_doc_tools_drift.py

      # Plan §5.2 -- downstream-consumer integration. Runs juniper-doc-
      # tools (just installed above) against every cloned consumer
      # repo's docs with each repo's canonical exclude set. Per-repo
      # results aggregated; the step fails only if a configurable
      # number of consumers regress in the same week (catastrophic
      # juniper-doc-tools regression vs. a one-off broken-doc PR in
      # any single repo).
      - name: Downstream-consumer integration check
        env:
          # Tolerate up to this many per-repo failures before declaring
          # a catastrophic juniper-doc-tools regression. With 7 consumers
          # (juniper-deploy has no doc-link CI), >=5 broken == majority.
          DOWNSTREAM_FAIL_THRESHOLD: "5"
        run: |
          set -uo pipefail
          cd "$GITHUB_WORKSPACE"
          # Canonical Juniper exclude set -- mirrors what each repo's
          # own ci.yml uses. If any consumer customizes its excludes,
          # update this list in lock-step (or this job will produce
          # false positives for that repo).
          ARGS=(
            --exclude templates
            --exclude history
            --exclude legacy
            --exclude pull_requests
            --exclude releases
            --exclude analysis
            --exclude fixes
            --exclude development
            --exclude CHANGELOG.md
            --cross-repo skip
          )

          # Consumer repos that ship a doc-link CI lane (juniper-deploy
          # excluded; it has no docs job in its ci.yml).
          CONSUMERS=(
            juniper-canopy
            juniper-cascor
            juniper-cascor-client
            juniper-cascor-worker
            juniper-data
            juniper-data-client
          )

          declare -i failures=0
          declare -a failed_repos=()
          for repo in "${CONSUMERS[@]}"; do
            if [ ! -d "$repo" ]; then
              echo "::warning::$repo not cloned (skip threshold)"
              continue
            fi
            echo ""
            echo "═══════════════════════════════════════════════════════════════"
            echo "  Downstream validation: $repo"
            echo "═══════════════════════════════════════════════════════════════"
            ( cd "$repo" && juniper-check-doc-links "${ARGS[@]}" )
            rc=$?
            if [ "$rc" -ne 0 ]; then
              failures=$((failures + 1))
              failed_repos+=("$repo")
              echo "::warning::$repo doc-link validation failed (exit $rc)"
            fi
          done

          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "  Downstream integration summary"
          echo "═══════════════════════════════════════════════════════════════"
          echo "  Failures: ${failures} / ${#CONSUMERS[@]}"
          if [ "$failures" -gt 0 ]; then
            echo "  Failed repos: ${failed_repos[*]}"
          fi
          echo "  Threshold:    >= ${DOWNSTREAM_FAIL_THRESHOLD} fail-this-job"

          if [ "$failures" -ge "$DOWNSTREAM_FAIL_THRESHOLD" ]; then
            echo "::error::$failures consumer repos failed doc-link validation -- catastrophic juniper-doc-tools regression suspected"
            exit 1
          elif [ "$failures" -gt 0 ]; then
            echo "::warning::$failures consumer repos broke doc-link validation -- investigate, but below catastrophic threshold (${DOWNSTREAM_FAIL_THRESHOLD})"
          fi

      # Wave 4 / §5 of the dep-docs PyPI migration plan
      # (notes/JUNIPER_CI_TOOLS_PYPI_MIGRATION_PLAN_2026-05-20.md).
      # Installs the published juniper-ci-tools package used by §5.1
      # (test_ci_tools_drift.py auto-discovers it via the on-disk
      # checkout, but the §5.2 downstream-consumer integration step
      # below needs the console script available in PATH).
      - name: Install juniper-ci-tools
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install "juniper-ci-tools>=0.1.0,<0.5.0"

      # Plan §5.1 (ci-tools) -- consumer-version-pin lint. Mirrors the
      # doc-tools §5.1 step above: walks each cloned consumer repo's
      # ci.yml, extracts the ``juniper-ci-tools>=X,<Y`` pin, and
      # asserts the range still admits the current version (read from
      # juniper-ci-tools/pyproject.toml in this checkout). Soft-warns
      # on pins more than 2 minors behind current; hard-fails when a
      # pin's upper bound excludes the current release.
      - name: Lint ci-tools pins across consumer repos
        run: |
          cd "$GITHUB_WORKSPACE/juniper-ml"
          python3 -m unittest -v tests/test_ci_tools_drift.py

      # Plan §5.2 (ci-tools) -- downstream-consumer integration. Runs
      # juniper-generate-dep-docs (just installed above) against every
      # cloned consumer repo. ``--no-conda`` is passed because the
      # weekly runner does not provision the conda environments that
      # each consumer's own ci.yml job sets up via setup-miniconda;
      # the pip-side regeneration alone is enough to assert that the
      # package wired into consumer CI remains invokable and the
      # header-template lookup still resolves. Per-repo results are
      # aggregated; the step fails only if a configurable number of
      # consumers regress in the same week (catastrophic
      # juniper-ci-tools regression vs. a one-off broken-pyproject
      # PR in any single repo).
      - name: Downstream-consumer integration check (ci-tools)
        env:
          # Tolerate up to this many per-repo failures before declaring
          # a catastrophic juniper-ci-tools regression. With 6 consumers
          # (juniper-deploy has no dep-docs CI step), >=4 broken == majority.
          DOWNSTREAM_CI_TOOLS_FAIL_THRESHOLD: "4"
        run: |
          set -uo pipefail
          cd "$GITHUB_WORKSPACE"

          # Consumer repos that ship a "Generate Dependency
          # Documentation" CI lane (juniper-deploy excluded; it has
          # no dep-docs job in its ci.yml).
          CONSUMERS=(
            juniper-canopy
            juniper-cascor
            juniper-cascor-client
            juniper-cascor-worker
            juniper-data
            juniper-data-client
          )

          declare -i failures=0
          declare -a failed_repos=()
          for repo in "${CONSUMERS[@]}"; do
            if [ ! -d "$repo" ]; then
              echo "::warning::$repo not cloned (skip)"
              continue
            fi
            echo ""
            echo "═══════════════════════════════════════════════════════════════"
            echo "  Downstream dep-docs validation: $repo"
            echo "═══════════════════════════════════════════════════════════════"
            (
              cd "$repo"
              # --no-conda: runner has no conda env to export from.
              # --no-yaml-validation: redundant once --no-conda is on,
              #   but explicit for future-proofing if --no-conda
              #   semantics ever change.
              juniper-generate-dep-docs --no-conda --no-yaml-validation
            )
            rc=$?
            if [ "$rc" -ne 0 ]; then
              failures=$((failures + 1))
              failed_repos+=("$repo")
              echo "::warning::$repo juniper-generate-dep-docs failed (exit $rc)"
            fi
          done

          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "  Downstream ci-tools integration summary"
          echo "═══════════════════════════════════════════════════════════════"
          echo "  Failures: ${failures} / ${#CONSUMERS[@]}"
          if [ "$failures" -gt 0 ]; then
            echo "  Failed repos: ${failed_repos[*]}"
          fi
          echo "  Threshold:    >= ${DOWNSTREAM_CI_TOOLS_FAIL_THRESHOLD} fail-this-job"

          if [ "$failures" -ge "$DOWNSTREAM_CI_TOOLS_FAIL_THRESHOLD" ]; then
            echo "::error::$failures consumer repos failed juniper-generate-dep-docs -- catastrophic juniper-ci-tools regression suspected"
            exit 1
          elif [ "$failures" -gt 0 ]; then
            echo "::warning::$failures consumer repos broke juniper-generate-dep-docs -- investigate, but below catastrophic threshold (${DOWNSTREAM_CI_TOOLS_FAIL_THRESHOLD})"
          fi

      - name: Audit claude.yml access safeguards (cross-repo, L2/L3)
        # JUNIPER_ROOT mode discovers every <root>/<repo>/.github/workflows/
        # claude.yml under the canonical Juniper repo list and validates each
        # in turn. Any repo that fails to clone above is silently skipped
        # by the validator (the `[ -f "$f" ]` guard in default_targets()),
        # so a transient clone failure doesn't mask a structural drift
        # finding in another repo.
        run: |
          cd "$GITHUB_WORKSPACE"
          JUNIPER_ROOT="$GITHUB_WORKSPACE" \
            bash juniper-ml/util/validate_claude_yaml_access.bash
