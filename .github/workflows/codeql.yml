---
#####################################################################################################################################################################################################
# Project:       Juniper
# File Name:     codeql.yml (template)
#
# Description:
#    Canonical CodeQL semantic-SAST workflow for the Juniper fleet's Python
#    repos. Drop this file verbatim into the target repo's
#    `.github/workflows/codeql.yml`. No per-repo customization is needed
#    for Python repos.
#
#    Source-of-truth copy: juniper-data/.github/workflows/codeql.yml
#    (the only fleet repo to ship this workflow as of 2026-04-29).
#
#    First-run behavior: treat the initial run as a soft-fail shakedown
#    cycle — triage findings, then promote the workflow to a required
#    branch-protection check.
#####################################################################################################################################################################################################

name: CodeQL Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          category: "/language:${{ matrix.language }}"
