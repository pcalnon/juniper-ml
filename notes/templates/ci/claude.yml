#####################################################################################################################################################################################################
# Project:       Juniper
# File Name:     claude.yml (template)
#
# Description:
#    Canonical `claude.yml` workflow for the Juniper fleet. Drop this file
#    verbatim into a target repo's `.github/workflows/claude.yml` to enable
#    the `@claude` PR / issue assistant. The action invocation is generic;
#    no per-repo customization is needed.
#
#    Required secret: ANTHROPIC_API_KEY (set at the org level; verify the
#    target repo can read the org secret before relying on this).
#
#    Source-of-truth copy: juniper-ml/.github/workflows/claude.yml.
#####################################################################################################################################################################################################

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@567fe954a4527e81f132d87d1bdbcc94f7737434  # v1.0.107
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
