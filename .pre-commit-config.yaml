#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-ml
# File Name:     .pre-commit-config.yaml
# Author:        Paul Calnon
# Version:       0.1.0
#
# Date Created:  2026-03-11
# Last Modified: 2026-03-11
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    Pre-commit hooks configuration for juniper-ml meta-package
#    Validates YAML, shell scripts, markdown, and Python test/script files
#
# Setup:
#    pip install pre-commit
#    pre-commit install
#    pre-commit run --all-files
#
# References:
#    - https://pre-commit.com/
#####################################################################################################################################################################################################

# Minimum pre-commit version required
minimum_pre_commit_version: "3.0.0"

# Default settings for all hooks
default_language_version:
  python: python3

# Exclude patterns (files/directories to skip)
exclude: |
  (?x)^(
      \.git/.*|
      \.venv/.*|
      venv/.*|
      __pycache__/.*|
      \.pytest_cache/.*|
      \.mypy_cache/.*|
      data/.*|
      prompts/.*|
      reports/.*|
      resources/.*|
      logs/.*|
      images/.*|
      .*\.egg-info/.*|
      .*\.ipynb_checkpoints/.*|
      .*/backups/.*|
      .*-ORIG\.py$|
      .*\.bak$|
      .*\.orig$|
      .*~$
  )$

repos:
  # ═══════════════════════════════════════════════════════════════════════════
  # General file checks
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        name: Check YAML syntax
      - id: check-toml
        name: Check TOML syntax
      - id: check-json
        name: Check JSON syntax
      - id: end-of-file-fixer
        name: Fix end of files
      - id: trailing-whitespace
        name: Trim trailing whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-added-large-files
        name: Check for large files
        args: [--maxkb=1000]
      - id: check-case-conflict
        name: Check case conflicts
      - id: check-ast
        name: Check Python AST
      - id: debug-statements
        name: Check for debug statements
      - id: detect-private-key
        name: Detect private keys

  # ═══════════════════════════════════════════════════════════════════════════
  # Python Formatting - Black (Scripts and Tests)
  # Alignment plan Phase 3: aligns juniper-ml with the rest of the
  # fleet's black + isort + mypy stack on its Python surface
  # (scripts/ + tests/ — no importable package).
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        name: Format with Black
        args:
          - --line-length=512
        files: ^(scripts|tests)/.*\.py$

  # ═══════════════════════════════════════════════════════════════════════════
  # Python Import Sorting - isort (Scripts and Tests)
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
      - id: isort
        name: Sort imports with isort
        args:
          - --profile=black
          - --line-length=512
        files: ^(scripts|tests)/.*\.py$

  # ═══════════════════════════════════════════════════════════════════════════
  # Python Linting - Flake8 (Scripts and Tests)
  # juniper-ml has no importable package, but has Python scripts and tests
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        name: Lint Python files with Flake8
        args:
          - --max-line-length=512
          - --extend-ignore=E203,E265,E266,E501,W503,E722,E402,E226,C409,C901,B008,B904,B905,B907,F401,F811
          - --max-complexity=20
          - --select=B,C,E,F,W,T4,B9
        additional_dependencies:
          - flake8-bugbear>=24.0.0
          - flake8-comprehensions>=3.14.0
          - flake8-simplify>=0.21.0
        files: ^(scripts|tests)/.*\.py$

  # ═══════════════════════════════════════════════════════════════════════════
  # Python Type Checking - MyPy (Scripts and Tests)
  # Lenient config to match the rest of the fleet's gradual typing
  # posture — ignore-missing-imports + no-strict-optional.
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: Type check with MyPy
        args:
          - --ignore-missing-imports
          - --no-strict-optional
          - --python-version=3.12
        files: ^(scripts|tests)/.*\.py$
        additional_dependencies:
          - types-PyYAML  # for tests/test_workflow_script_paths.py

  # ═══════════════════════════════════════════════════════════════════════════
  # Security Scanning - Bandit (Python scripts)
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        name: Security scan Python files with Bandit
        args:
          - -q
          - --skip=B101,B108,B311,B404,B603,B604,B607
          # B101: assert_used (tests use assertions extensively)
          # B108: hardcoded_tmp_directory (tests use /tmp paths)
          # B311: random (not used for security)
          # B404: import_subprocess (scripts invoke bash/git)
          # B603: subprocess_without_shell_check (test harness)
          # B604: any_other_function_with_shell (test harness)
          # B607: start_process_with_partial_path (scripts invoke bash/git)
        files: ^(scripts|tests)/.*\.py$

  # ═══════════════════════════════════════════════════════════════════════════
  # Sub-package Python governance — Ruff (lint + format)
  #
  # The black / isort / flake8 / mypy / bandit hooks above are scoped to this
  # repo's own Python (^(scripts|tests)/). The six internal sub-packages
  # (juniper-ci-tools, -config-tools, -doc-tools, -model-core, -observability,
  # -service-core) ship their own [tool.ruff] config and are governed here by a
  # single Ruff hook pair. Ruff resolves the nearest pyproject.toml per file, so
  # each sub-package's own line-length / lint config applies automatically
  # (doc-tools=320, the rest=512) within one invocation. Closes audit finding F3.
  #
  # Pin: ruff-pre-commit must be >= v0.15.13 — the release that raised the
  # line-length cap 320 -> 512 (the sub-packages use 512); older ruff rejects the
  # config at parse time. Mirrors juniper-recurrence's monorepo ruff lane.
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff
        name: Lint sub-package Python with Ruff
        args: [--fix]
        files: ^juniper-(ci-tools|config-tools|doc-tools|model-core|observability|service-core)/.*\.py$
      - id: ruff-format
        name: Format sub-package Python with Ruff
        files: ^juniper-(ci-tools|config-tools|doc-tools|model-core|observability|service-core)/.*\.py$

  # ═══════════════════════════════════════════════════════════════════════════
  # Shell Script Linting - shellcheck
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: Lint shell scripts
        args:
          - --severity=warning
        files: \.(sh|bash)$

  # ═══════════════════════════════════════════════════════════════════════════
  # Markdown Linting
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        name: Lint Markdown files
        args:
          - --config=./.markdownlint.yaml
          - --fix
        files: \.(md|markdown)$
        exclude: ^(CHANGELOG\.md|notes/|docs/|prompts/|scripts/test_prompt-.*\.md)

  # ═══════════════════════════════════════════════════════════════════════════
  # Documentation link validation (juniper-doc-tools)
  # Wave 3 of the doc-link migration plan; mirrors the per-PR docs CI lane
  # so devs catch broken markdown links locally before push.
  # See juniper-ml notes/JUNIPER_DOC_TOOLS_PYPI_MIGRATION_PLAN_2026-05-18.md.
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: local
    hooks:
      - id: juniper-check-doc-links
        name: Validate documentation links
        entry: juniper-check-doc-links
        language: python
        additional_dependencies: ["juniper-doc-tools>=0.1.1,<0.2.0"]
        args:
          - --exclude
          - templates
          - --exclude
          - history
          - --exclude
          - legacy
          - --exclude
          - pull_requests
          - --exclude
          - releases
          - --exclude
          - analysis
          - --exclude
          - fixes
          - --exclude
          - development
          - --exclude
          - CHANGELOG.md
          - --cross-repo
          - skip
        pass_filenames: false
        files: \.md$

  # ═══════════════════════════════════════════════════════════════════════════
  # YAML Linting - yamllint
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: Lint YAML files
        args: [--format, parsable]
        types: [yaml]

  # ═══════════════════════════════════════════════════════════════════════════
  # SOPS: Block unencrypted .env files from being committed
  # ═══════════════════════════════════════════════════════════════════════════
  - repo: local
    hooks:
      - id: no-unencrypted-env
        name: Block unencrypted .env files
        entry: 'bash -c "echo ERROR: Unencrypted .env file detected. Use sops to encrypt. && exit 1"'
        language: system
        files: '^\.env(\.secrets)?$'
        types: [file]

# CI configuration (for pre-commit.ci service, if used)
ci:
  autofix_prs: false
  autoupdate_schedule: monthly
